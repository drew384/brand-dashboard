<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
</head>
<body data-theme="dark">
  <main class="dashboard">
    <header class="header">
      <div class="header__top">
        <div>
          <h1>Brand Dashboard</h1>
          <p class="subtitle">Personal brand analytics</p>
        </div>
        <div class="header__controls">
          <label for="date-range-input" class="visually-hidden">Date range</label>
          <input id="date-range-input" type="text" class="date-range-input" placeholder="Select date range" readonly aria-label="Chart date range">
          <button type="button" class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">☀</span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">☽</span>
          </button>
        </div>
      </div>
    </header>

    <section class="cards">
      <article class="card card--twitter">
        <div class="card__header">
          <span class="card__icon" aria-hidden="true">𝕏</span>
          <h2>Twitter / X</h2>
        </div>
        <div class="card__body" data-twitter>
          <div class="loading" data-twitter-loading>Loading…</div>
          <div class="error hidden" data-twitter-error></div>
          <div class="metrics hidden" data-twitter-metrics>
            <div class="metric">
              <span class="metric__value" data-twitter-followers>—</span>
              <span class="metric__label">Followers</span>
            </div>
            <div class="metric">
              <span class="metric__value" data-twitter-following>—</span>
              <span class="metric__label">Following</span>
            </div>
            <div class="metric">
              <span class="metric__value" data-twitter-tweets>—</span>
              <span class="metric__label">Tweets</span>
            </div>
            <div class="metric">
              <span class="metric__value" data-twitter-impressions>—</span>
              <span class="metric__label">Impressions (7d)</span>
            </div>
          </div>
        </div>
      </article>

      <article class="card card--linkedin">
        <div class="card__header">
          <span class="card__icon card__icon--linkedin" aria-hidden="true">in</span>
          <h2>LinkedIn</h2>
        </div>
        <div class="card__body" data-linkedin>
          <div class="loading" data-linkedin-loading>Loading…</div>
          <div class="error hidden" data-linkedin-error></div>
          <div class="metrics hidden" data-linkedin-metrics>
            <div class="metric">
              <span class="metric__value" data-linkedin-followers>—</span>
              <span class="metric__label">Connections</span>
            </div>
            <div class="metric">
              <span class="metric__value" data-linkedin-impressions>—</span>
              <span class="metric__label">Impressions (30d)</span>
            </div>
          </div>
        </div>
      </article>
    </section>

    <section class="chart-section">
      <div class="chart-section__header">
        <div>
          <h2 class="chart-section__title">Impressions over time</h2>
          <p class="chart-section__hint">Real daily data from Twitter and LinkedIn. Twitter: impressions from tweets posted each day.</p>
        </div>
        <div class="chart-section__total" data-chart-total>—</div>
      </div>
      <div class="chart-wrapper">
        <canvas id="impressionsChart" aria-label="Impressions line chart"></canvas>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="app.js"></script>
</body>
</html>
